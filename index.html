<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#3A1F6E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>สแกนเช็ค</title>
<style>
:root{
  --purple:#3A1F6E;--purple-mid:#5B3FA6;--purple-light:#EDE9F8;
  --teal:#0E7C6B;--navy:#1A56A0;
  --green-bg:#C8E6C9;--green-txt:#1B5E20;
  --amber-bg:#FFE0B2;--amber-txt:#E65100;
  --red-bg:#FFCDD2;--red-txt:#B71C1C;
  --gray:#f5f5f5;--border:#e0d9f5;
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:#F3F0FA;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:0 0 32px}

/* ── header ── */
header{width:100%;background:var(--purple);padding:18px 20px 14px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{color:#fff;font-size:17px;font-weight:700;flex:1}
header .step{font-size:12px;color:rgba(255,255,255,.6);white-space:nowrap}

/* ── content ── */
.wrap{width:100%;max-width:480px;padding:14px 14px 0}

/* ── steps indicator ── */
.steps{display:flex;gap:0;margin-bottom:14px}
.steps .s{flex:1;text-align:center;font-size:11px;color:rgba(255,255,255,.5);
  padding:6px 4px;background:rgba(255,255,255,.08);position:relative}
.steps .s.active{color:#fff;background:rgba(255,255,255,.18);font-weight:700}
.steps .s.done{color:rgba(255,255,255,.7);background:rgba(255,255,255,.12)}
.steps .s:first-child{border-radius:8px 0 0 8px}
.steps .s:last-child{border-radius:0 8px 8px 0}

/* ── card ── */
.card{background:#fff;border-radius:var(--radius);padding:16px;
  margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--purple-mid);
  margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* ── viewfinder / preview ── */
#viewfinder{width:100%;aspect-ratio:3/2;background:#111;border-radius:10px;
  overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
#viewfinder video,#viewfinder img{width:100%;height:100%;object-fit:cover}
#viewfinder .guide{position:absolute;inset:10%;border:2px solid rgba(255,255,255,.5);
  border-radius:6px;pointer-events:none}
#viewfinder .guide::before,#viewfinder .guide::after{
  content:'';position:absolute;width:20px;height:20px;border-color:#fff;border-style:solid}
#viewfinder .guide::before{top:-2px;left:-2px;border-width:3px 0 0 3px}
#viewfinder .guide::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0}
#placeholder-icon{font-size:48px;opacity:.3}

/* ── ปุ่มกล้อง ── */
.cam-controls{display:flex;gap:10px;margin-top:10px;align-items:center;justify-content:center}
#btn-shutter{width:64px;height:64px;border-radius:50%;background:var(--purple);border:4px solid var(--purple-light);
  font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(58,31,110,.35);transition:transform .1s}
#btn-shutter:active{transform:scale(.93)}
#btn-flip{width:44px;height:44px;border-radius:50%;background:rgba(58,31,110,.12);border:none;
  font-size:20px;cursor:pointer}
#btn-gallery{width:44px;height:44px;border-radius:50%;background:rgba(58,31,110,.12);border:none;
  font-size:20px;cursor:pointer}
#inp-gallery{display:none}

/* ── ปุ่มทั่วไป ── */
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;
  font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s,transform .1s}
.btn:active{opacity:.85;transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-ocr {background:var(--teal);color:#fff;margin-top:10px}
.btn-save{background:var(--navy);color:#fff;margin-top:8px}
.btn-new {background:var(--gray);color:#555;margin-top:6px;font-size:13px;padding:11px}

/* ── form ── */
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#888;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.field input{width:100%;padding:11px 12px;border:1.5px solid var(--border);
  border-radius:8px;font-size:15px;font-family:'Sarabun',sans-serif;color:#222;
  background:#fff;transition:border-color .15s}
.field input:focus{outline:none;border-color:var(--purple-mid)}
.field input:disabled{background:#f9f9f9;color:#999}

/* ── badge ── */
.badge{display:inline-flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px}
.badge.high  {background:var(--green-bg);color:var(--green-txt)}
.badge.medium{background:var(--amber-bg);color:var(--amber-txt)}
.badge.low   {background:var(--red-bg);color:var(--red-txt)}

/* ── filename box ── */
.fname-wrap{background:var(--purple-light);border-radius:8px;padding:10px 12px;margin-top:8px}
.fname-label{font-size:10px;color:var(--purple-mid);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.fname-val{font-size:14px;color:var(--purple);font-weight:700;word-break:break-all;margin-top:3px}

/* ── status ── */
#status{width:100%;max-width:480px;padding:0 14px}
.status-box{border-radius:10px;padding:12px 14px;font-size:13px;margin-top:8px;
  display:flex;align-items:flex-start;gap:8px}
.status-box.load{background:var(--purple-light);color:var(--purple)}
.status-box.ok  {background:var(--green-bg);color:var(--green-txt)}
.status-box.err {background:var(--red-bg);color:var(--red-txt)}

/* ── spinner ── */
.spin{width:16px;height:16px;min-width:16px;border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
.spin.dark{border-color:rgba(58,31,110,.2);border-top-color:var(--purple)}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── success screen ── */
#success-screen{display:none;text-align:center;padding:32px 16px}
#success-screen .icon{font-size:64px;margin-bottom:12px}
#success-screen h2{color:var(--green-txt);font-size:20px;margin-bottom:6px}
#success-screen p{color:#666;font-size:14px;line-height:1.6}
#success-screen .link{color:var(--navy);font-size:13px;word-break:break-all;
  background:#e8f0fb;padding:8px 12px;border-radius:8px;margin-top:12px;display:block;text-decoration:none}
</style>
</head>
<body>

<header>
  <h1>📷 สแกนเช็คสั่งจ่าย</h1>
  <span class="step" id="step-label">ขั้นตอน 1/3</span>
</header>

<div class="wrap">

  <!-- STEP 1: ถ่ายรูป -->
  <div id="screen-cam">
    <div class="card">
      <div class="card-title">📸 ถ่ายรูปหน้าเช็ค</div>
      <div id="viewfinder">
        <div id="placeholder-icon">📄</div>
      </div>
      <div class="cam-controls">
        <button id="btn-gallery" onclick="openGallery()" title="เลือกจากคลัง">🖼</button>
        <button id="btn-shutter" onclick="takePhoto()" title="ถ่ายรูป">📷</button>
        <button id="btn-flip"    onclick="flipCamera()" title="สลับกล้อง">🔄</button>
      </div>
      <input id="inp-gallery" type="file" accept="image/*" onchange="onGalleryFile(this)">
    </div>
    <button class="btn btn-ocr" id="btn-ocr" onclick="runOCR()" style="display:none">
      🔍 อ่านข้อมูลเช็ค
    </button>
  </div>

  <!-- STEP 2: ตรวจสอบข้อมูล -->
  <div id="screen-review" style="display:none">
    <div class="card">
      <div class="card-title">📋 ตรวจสอบข้อมูลก่อนบันทึก</div>
      <div id="conf-badge"></div>
      <div class="field"><label>เลขที่เช็ค</label><input id="f-no"   type="tel"  placeholder="เช่น 43986730"></div>
      <div class="field"><label>ธนาคาร</label>    <input id="f-bank" type="text" placeholder="เช่น ทหารไทยธนชาต"></div>
      <div class="field"><label>วันที่ (DD/MM/YYYY)</label><input id="f-date" type="text" placeholder="เช่น 09/01/2565"></div>
      <div class="field"><label>จำนวนเงิน (บาท)</label>   <input id="f-amt"  type="tel"  placeholder="เช่น 48109.68"></div>
      <div class="field"><label>ผู้รับเงิน</label><input id="f-payee" type="text"></div>
      <div class="fname-wrap">
        <div class="fname-label">ชื่อไฟล์ที่จะบันทึก</div>
        <div class="fname-val" id="fname-val">—</div>
      </div>
    </div>
    <button class="btn btn-save" id="btn-save" onclick="doSave()">☁️ บันทึกขึ้น Google Drive</button>
    <button class="btn btn-new"  onclick="resetAll()">← ถ่ายใหม่</button>
  </div>

  <!-- STEP 3: สำเร็จ -->
  <div id="screen-done" style="display:none">
    <div class="card">
      <div id="success-screen">
        <div class="icon">✅</div>
        <h2>บันทึกสำเร็จ</h2>
        <p id="done-msg"></p>
        <a id="done-link" class="link" href="#" target="_blank">เปิดไฟล์ใน Google Drive</a>
      </div>
    </div>
    <button class="btn btn-ocr" onclick="resetAll()">📷 สแกนเช็คใบต่อไป</button>
  </div>

</div>

<div id="status"></div>

<!-- canvas สำหรับ capture รูปจากกล้อง -->
<canvas id="canvas" style="display:none"></canvas>

<script>
// ── Config (แก้ไขก่อน deploy) ────────────────────────
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxej2efdZ6h2B9Hab0YJ7Opgc85UrQFhQ3WVoWRf9BrKG5m5imH2PasmFgnzQOKAyfa/exec";
// เช่น "https://script.google.com/macros/s/AKfycb.../exec"
// ──────────────────────────────────────────────────────

var stream = null, facingMode = "environment";
var capturedB64 = "", capturedMime = "image/jpeg";

// ── เริ่มกล้อง ──
async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    var vf = document.getElementById("viewfinder");
    var existing = vf.querySelector("video");
    if (existing) existing.remove();
    document.getElementById("placeholder-icon").style.display = "none";

    var vid = document.createElement("video");
    vid.srcObject = stream;
    vid.autoplay = true;
    vid.playsInline = true;
    vid.muted = true;
    vf.insertBefore(vid, vf.firstChild);

    var guide = vf.querySelector(".guide") || document.createElement("div");
    guide.className = "guide";
    vf.appendChild(guide);
  } catch(e) {
    setStatus("⚠️ ไม่สามารถเปิดกล้องได้: " + e.message + " — กรุณากด 🖼 เพื่อเลือกรูปแทน", "err");
  }
}

// ── ถ่ายรูป ──
function takePhoto() {
  var vid = document.getElementById("viewfinder").querySelector("video");
  if (!vid) { setStatus("กล้องยังไม่พร้อม — ลองกด 🖼 เลือกรูปแทน", "err"); return; }
  var canvas = document.getElementById("canvas");
  canvas.width  = vid.videoWidth  || 1280;
  canvas.height = vid.videoHeight || 720;
  canvas.getContext("2d").drawImage(vid, 0, 0);
  capturedB64  = canvas.toDataURL("image/jpeg", 0.92).split(",")[1];
  capturedMime = "image/jpeg";
  showPreview(canvas.toDataURL("image/jpeg", 0.92));
}

// ── สลับกล้องหน้า/หลัง ──
function flipCamera() {
  facingMode = facingMode === "environment" ? "user" : "environment";
  startCamera();
}

// ── เลือกจากคลัง ──
function openGallery() {
  var el = document.getElementById("inp-gallery");
  el.value = ""; el.click();
}
function onGalleryFile(inp) {
  var f = inp.files[0]; if (!f) return;
  capturedMime = f.type || "image/jpeg";
  var r = new FileReader();
  r.onload = function(e) {
    capturedB64 = e.target.result.split(",")[1];
    showPreview(e.target.result);
  };
  r.readAsDataURL(f);
}

// ── แสดง preview ──
function showPreview(dataUrl) {
  var vf = document.getElementById("viewfinder");
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  vf.innerHTML = "";
  var img = document.createElement("img");
  img.src = dataUrl;
  vf.appendChild(img);
  document.getElementById("btn-ocr").style.display = "flex";
  setStatus("", "");
}

// ── OCR ──
async function runOCR() {
  if (!capturedB64) { setStatus("กรุณาถ่ายรูปก่อน", "err"); return; }
  var btn = document.getElementById("btn-ocr");
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> กำลังอ่านด้วย AI...';
  setStatus("🔍 Claude AI กำลังวิเคราะห์รูปเช็ค...", "load");

  try {
    var res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action:"ocr", image:capturedB64, mime:capturedMime }),
      headers: { "Content-Type":"application/json" }
    });
    var data = await res.json();
    btn.disabled = false;
    btn.innerHTML = "🔍 อ่านข้อมูลเช็ค";
    if (!data.success) { setStatus("❌ " + (data.error||"อ่านไม่ได้ — ลองใหม่"), "err"); return; }
    fillForm(data);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = "🔍 อ่านข้อมูลเช็ค";
    setStatus("❌ " + e.message, "err");
  }
}

// ── กรอกฟอร์ม ──
function fillForm(d) {
  document.getElementById("f-no").value    = d.check_no || "";
  document.getElementById("f-bank").value  = d.bank     || "";
  document.getElementById("f-date").value  = d.date     || "";
  document.getElementById("f-amt").value   = d.amount   || "";
  document.getElementById("f-payee").value = d.payee    || "";
  updateFname();

  var conf = d.confidence || "medium";
  var lbl  = {high:"✅ มั่นใจสูง — ตรวจสอบแล้วบันทึกได้เลย",
              medium:"⚠️ ความมั่นใจปานกลาง — โปรดตรวจสอบทุกช่อง",
              low:"❌ ความมั่นใจต่ำ — กรุณาแก้ไขก่อนบันทึก"};
  document.getElementById("conf-badge").innerHTML =
    '<div class="badge '+conf+'">'+lbl[conf]+'</div>';

  document.getElementById("screen-cam").style.display    = "none";
  document.getElementById("screen-review").style.display = "block";
  document.getElementById("step-label").textContent = "ขั้นตอน 2/3";
  setStatus("", "");
  window.scrollTo(0, 0);
}

function updateFname() {
  var no   = document.getElementById("f-no").value.trim();
  var bank = document.getElementById("f-bank").value.trim();
  document.getElementById("fname-val").textContent =
    (no && bank) ? no+"_"+bank+".pdf" : (no ? no+".pdf" : "—");
}
["f-no","f-bank"].forEach(function(id){
  document.getElementById(id).addEventListener("input", updateFname);
});

// ── บันทึก ──
async function doSave() {
  var cd = {
    check_no : document.getElementById("f-no").value.trim(),
    bank     : document.getElementById("f-bank").value.trim(),
    date     : document.getElementById("f-date").value.trim(),
    amount   : document.getElementById("f-amt").value.trim(),
    payee    : document.getElementById("f-payee").value.trim(),
    filename : document.getElementById("fname-val").textContent
  };
  if (!cd.check_no || !cd.bank) {
    setStatus("❌ กรุณากรอกเลขที่เช็คและธนาคารก่อน", "err"); return;
  }
  var btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> กำลังอัพโหลด...';
  setStatus("☁️ กำลังบันทึก " + cd.filename + " ขึ้น Google Drive...", "load");

  try {
    var res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action:"save", image:capturedB64, mime:capturedMime, data:cd }),
      headers: { "Content-Type":"application/json" }
    });
    var result = await res.json();
    btn.disabled = false;
    btn.innerHTML = "☁️ บันทึกขึ้น Google Drive";

    if (!result.success) { setStatus("❌ " + (result.error||"บันทึกไม่สำเร็จ"), "err"); return; }

    document.getElementById("screen-review").style.display = "none";
    document.getElementById("screen-done").style.display   = "block";
    document.getElementById("step-label").textContent      = "ขั้นตอน 3/3";
    document.getElementById("done-msg").textContent =
      result.filename + (result.linked ? "\nอัพเดท Link ใน Google Sheet แล้ว ✓" : "\n(ไม่พบเลขที่เช็คใน Sheet)");
    document.getElementById("done-link").href = result.fileUrl || "#";
    setStatus("", "");
    window.scrollTo(0, 0);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = "☁️ บันทึกขึ้น Google Drive";
    setStatus("❌ " + e.message, "err");
  }
}

// ── reset ──
function resetAll() {
  capturedB64 = ""; capturedMime = "image/jpeg";
  document.getElementById("screen-cam").style.display    = "block";
  document.getElementById("screen-review").style.display = "none";
  document.getElementById("screen-done").style.display   = "none";
  document.getElementById("btn-ocr").style.display       = "none";
  document.getElementById("btn-ocr").disabled            = false;
  document.getElementById("btn-ocr").innerHTML           = "🔍 อ่านข้อมูลเช็ค";
  document.getElementById("btn-save").disabled           = false;
  document.getElementById("btn-save").innerHTML          = "☁️ บันทึกขึ้น Google Drive";
  document.getElementById("step-label").textContent      = "ขั้นตอน 1/3";
  ["f-no","f-bank","f-date","f-amt","f-payee"].forEach(function(id){
    document.getElementById(id).value = "";
  });
  document.getElementById("fname-val").textContent = "—";
  document.getElementById("conf-badge").innerHTML  = "";
  document.getElementById("inp-gallery").value     = "";
  setStatus("", "");
  startCamera();
  window.scrollTo(0, 0);
}

function setStatus(msg, type) {
  var el = document.getElementById("status");
  if (!msg) { el.innerHTML = ""; return; }
  el.innerHTML = '<div class="status-box '+type+'">'+msg+'</div>';
}

// ── เริ่มต้น ──
startCamera();
</script>
</body>
</html>

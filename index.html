<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#3A1F6E">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>สแกนเช็ค</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100vh}
body{font-family:'Sarabun',sans-serif;background:#F3F0FA;font-size:18px;padding-bottom:40px}
header{background:#3A1F6E;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{color:#fff;font-size:22px;font-weight:700}
header span{color:rgba(255,255,255,.75);font-size:15px}
.wrap{width:100%;padding:16px}
.card{background:#fff;border-radius:18px;padding:22px;margin-bottom:16px;box-shadow:0 3px 12px rgba(0,0,0,.09)}
.card-title{font-size:18px;font-weight:700;color:#5B3FA6;margin-bottom:18px}
#preview-wrap{width:100%;min-height:220px;background:#f0eeff;border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:6px}
#preview-img{width:100%;max-height:360px;object-fit:contain;display:none}
#preview-ph{text-align:center;color:#9E8DC7;padding:36px 20px}
#preview-ph .ic{font-size:64px;margin-bottom:12px}
#preview-ph p{font-size:17px;line-height:1.7}
.size-info{font-size:13px;color:#888;text-align:right;margin-top:6px;min-height:20px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.btn-cam,.btn-gal{border:none;border-radius:14px;padding:22px 8px;font-size:18px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;font-family:'Sarabun',sans-serif;width:100%}
.btn-cam{background:#3A1F6E;color:#fff}
.btn-gal{background:#EDE9F8;color:#3A1F6E}
.btn-cam .ic,.btn-gal .ic{font-size:40px}
button:active{opacity:.8;transform:scale(.97)}
.btn-full{width:100%;padding:20px;border:none;border-radius:14px;font-size:19px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px}
.btn-full:disabled{opacity:.45;cursor:not-allowed}
.btn-ocr{background:#0E7C6B;color:#fff}
.btn-save{background:#1A56A0;color:#fff}
.btn-new{background:#e0e0e0;color:#444;font-size:16px;padding:16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:14px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.field input{width:100%;padding:16px;border:2px solid #e0d9f5;border-radius:12px;font-size:19px;font-family:'Sarabun',sans-serif;color:#222;background:#fff}
.field input:focus{outline:none;border-color:#5B3FA6;background:#faf8ff}
.field input:disabled{background:#f5f5f5;color:#aaa}
.badge{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:24px;font-size:16px;font-weight:700;margin-bottom:16px}
.high{background:#C8E6C9;color:#1B5E20}
.medium{background:#FFE0B2;color:#E65100}
.low{background:#FFCDD2;color:#B71C1C}
.fname-box{background:#EDE9F8;border-radius:12px;padding:16px;margin-top:12px}
.fname-lbl{font-size:13px;color:#5B3FA6;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.fname-val{font-size:17px;color:#3A1F6E;font-weight:700;word-break:break-all;margin-top:4px}
.status{border-radius:14px;padding:16px 18px;font-size:16px;margin-top:14px;line-height:1.7}
.s-load{background:#EDE9F8;color:#3A1F6E}
.s-ok{background:#C8E6C9;color:#1B5E20}
.s-err{background:#FFCDD2;color:#B71C1C}
.done-box{text-align:center;padding:32px 20px}
.done-box .ic{font-size:80px;margin-bottom:16px}
.done-box h2{color:#1B5E20;font-size:26px;margin-bottom:12px;font-weight:700}
.done-box p{color:#555;font-size:17px;line-height:1.9;white-space:pre-line}
.done-link{display:block;background:#e8f0fb;color:#1A56A0;border-radius:12px;padding:16px 18px;margin-top:18px;text-decoration:none;font-size:16px;word-break:break-all;font-weight:700}
.spin{width:20px;height:20px;min-width:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
input[type=file]{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
canvas{display:none}
.payee-suggest{margin-top:8px;display:flex;flex-wrap:wrap;gap:8px}
.payee-chip{background:#EDE9F8;color:#3A1F6E;border:1.5px solid #C5B8E8;border-radius:20px;padding:8px 14px;font-size:14px;font-family:'Sarabun',sans-serif;cursor:pointer}
.payee-chip:active{opacity:.7}
.payee-hint{font-size:12px;color:#9E8DC7;margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>📷 สแกนเช็คสั่งจ่าย</h1>
  <span id="step-lbl">ขั้นตอน 1/3</span>
</header>
<div class="wrap">
<!-- STEP 1 -->
<div id="s1">
  <div class="card">
    <div class="card-title">📸 ถ่ายหรือเลือกรูปหน้าเช็ค</div>
    <div id="preview-wrap">
      <div id="preview-ph">
        <div class="ic">📄</div>
        <p>กดปุ่มด้านล่าง<br>เพื่อถ่ายหรือเลือกรูปเช็ค</p>
      </div>
      <img id="preview-img" alt="รูปเช็ค">
    </div>
    <div class="size-info" id="size-info"></div>
    <div class="btn-row">
      <button class="btn-cam" onclick="document.getElementById('inp-cam').click()">
        <span class="ic">📷</span><span>ถ่ายรูป</span>
      </button>
      <button class="btn-gal" onclick="document.getElementById('inp-gal').click()">
        <span class="ic">🖼️</span><span>คลังรูป</span>
      </button>
    </div>
    <input id="inp-cam" type="file" accept="image/*" capture="environment" onchange="onImg(this)">
    <input id="inp-gal" type="file" accept="image/*" onchange="onImg(this)">
  </div>
  <button class="btn-full btn-ocr" id="btn-ocr" onclick="runOCR()" style="display:none">🔍 อ่านข้อมูลเช็ค</button>
  <div id="st1"></div>
</div>
<!-- STEP 2 -->
<div id="s2" style="display:none">
  <div class="card">
    <div class="card-title">📋 ตรวจสอบข้อมูลก่อนบันทึก</div>
    <div id="badge-wrap"></div>
    <div class="field"><label>เลขที่เช็ค</label><input id="f1" type="tel" placeholder="เช่น 88036175"></div>
    <div class="field"><label>ธนาคาร</label><input id="f2" type="text" placeholder="เช่น ทหารไทยธนชาต"></div>
    <div class="field"><label>วันที่ (DD/MM/YYYY)</label><input id="f3" type="text"></div>
    <div class="field"><label>จำนวนเงิน (บาท)</label><input id="f4" type="tel"></div>
    <div class="field">
      <label>ผู้รับเงิน</label>
      <input id="f5" type="text">
      <div class="payee-suggest" id="payee-suggest"></div>
      <div class="payee-hint" id="payee-hint" style="display:none">ระบบเทียบชื่อกับที่เคยบันทึกไว้แล้ว — กดชื่อที่ใกล้เคียงเพื่อแก้ให้ถูกต้องทันที</div>
    </div>
    <div class="fname-box">
      <div class="fname-lbl">ชื่อไฟล์ที่จะบันทึก</div>
      <div class="fname-val" id="fname">—</div>
    </div>
  </div>
  <button class="btn-full btn-save" id="btn-save" onclick="doSave()">☁️ บันทึกขึ้น Google Drive</button>
  <button class="btn-full btn-new" onclick="resetAll()">← ถ่ายใหม่</button>
  <div id="st2"></div>
</div>
<!-- STEP 3 -->
<div id="s3" style="display:none">
  <div class="card">
    <div class="done-box">
      <div class="ic">✅</div>
      <h2>บันทึกสำเร็จ!</h2>
      <p id="done-msg"></p>
      <a id="done-url" class="done-link" href="#" target="_blank">📂 เปิดไฟล์ใน Google Drive</a>
    </div>
  </div>
  <button class="btn-full btn-ocr" onclick="resetAll()">📷 สแกนเช็คใบต่อไป</button>
</div>
</div>
<canvas id="cv"></canvas>
<script>
// ── ใส่ URL Apps Script ──
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxej2efdZ6h2B9Hab0YJ7Opgc85UrQFhQ3WVoWRf9BrKG5m5imH2PasmFgnzQOKAyfa/exec";
// ────────────────────────
var b64Ocr="", b64Save="", mime="image/jpeg";

// ── รายชื่อผู้รับเงินที่เคยบันทึกไว้แล้ว (โหลดตอนเปิดหน้า ใช้แนะนำ/แก้ชื่อที่ AI อ่านผิด) ──
var payeeList = [];
function loadPayeeList(){
  var xhr=new XMLHttpRequest();
  xhr.open("GET",SCRIPT_URL+"?action=payees",true);
  xhr.timeout=20000;
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4) return;
    try{
      var list=JSON.parse(xhr.responseText);
      payeeList = Array.isArray(list) ? list : [];
    }catch(e){ payeeList=[]; }
  };
  xhr.send();
}
loadPayeeList();

// ── Levenshtein distance + ความคล้าย 0-1 สำหรับเทียบชื่อผู้รับเงิน ──
function levenshtein(a,b){
  var m=a.length,n=b.length;
  if(m===0) return n;
  if(n===0) return m;
  var dp=new Array(m+1);
  for(var i=0;i<=m;i++){ dp[i]=new Array(n+1); dp[i][0]=i; }
  for(var j=0;j<=n;j++) dp[0][j]=j;
  for(var i=1;i<=m;i++){
    for(var j=1;j<=n;j++){
      var cost = a.charAt(i-1)===b.charAt(j-1) ? 0 : 1;
      dp[i][j]=Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}
function similarity(a,b){
  if(!a||!b) return 0;
  var maxLen=Math.max(a.length,b.length);
  if(maxLen===0) return 1;
  return 1 - levenshtein(a,b)/maxLen;
}
// หาชื่อผู้รับเงินที่เคยบันทึกไว้แล้ว ใกล้เคียงกับข้อความที่พิมพ์/OCR อ่านได้
function suggestPayee(raw){
  raw=(raw||"").trim();
  if(!raw || !payeeList.length) return [];
  var scored=payeeList.map(function(name){ return {name:name, score:similarity(raw,name)}; });
  scored.sort(function(a,b){ return b.score-a.score; });
  return scored.filter(function(s){ return s.score>=0.6 && s.name!==raw; }).slice(0,3);
}
function renderPayeeSuggestions(raw){
  var box=document.getElementById("payee-suggest");
  var hint=document.getElementById("payee-hint");
  var suggestions=suggestPayee(raw);
  box.innerHTML="";
  if(suggestions.length===0){ hint.style.display="none"; return; }
  hint.style.display="block";
  suggestions.forEach(function(s){
    var pct=Math.round(s.score*100);
    var chip=document.createElement("button");
    chip.type="button";
    chip.className="payee-chip";
    chip.textContent="✓ "+s.name+" ("+pct+"%)";
    chip.onclick=function(){
      document.getElementById("f5").value=s.name;
      box.innerHTML="";
      hint.style.display="none";
      updateFname();
    };
    box.appendChild(chip);
  });
}

function resizeImage(dataUrl,maxW,maxH,quality,cb){
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height;
    var ratio=Math.min(maxW/w,maxH/h,1);
    w=Math.round(w*ratio); h=Math.round(h*ratio);
    var cv=document.getElementById("cv");
    cv.width=w; cv.height=h;
    cv.getContext("2d").drawImage(img,0,0,w,h);
    cb(cv.toDataURL("image/jpeg",quality).split(",")[1]);
  };
  img.src=dataUrl;
}
function getKB(b64){return Math.round(b64.length*0.75/1024);}
function onImg(inp){
  var f=inp.files[0]; if(!f) return;
  mime="image/jpeg";
  setStatus("st1","⏳ กำลังประมวลผลรูป...","load");
  var r=new FileReader();
  r.onload=function(e){
    var dataUrl=e.target.result;
    // OCR: 1200px คุณภาพสูง
    resizeImage(dataUrl,1200,900,0.88,function(ocrB64){
      b64Ocr=ocrB64;
      // Save: 900px คุณภาพดี — ชัด แต่ไม่หนักเกินไป
      resizeImage(dataUrl,900,675,0.80,function(saveB64){
        b64Save=saveB64;
        var img=document.getElementById("preview-img");
        img.src=dataUrl;
        img.style.display="block";
        document.getElementById("preview-ph").style.display="none";
        document.getElementById("btn-ocr").style.display="flex";
        document.getElementById("s2").style.display="none";
        document.getElementById("size-info").textContent=
          "OCR: ~"+getKB(b64Ocr)+"KB  |  บันทึก: ~"+getKB(b64Save)+"KB";
        setStatus("st1","✅ รูปพร้อมแล้ว","ok");
      });
    });
  };
  r.readAsDataURL(f);
}
function runOCR(){
  if(!b64Ocr){setStatus("st1","กรุณาเลือกรูปก่อน","err");return;}
  var btn=document.getElementById("btn-ocr");
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> กำลังอ่าน AI...';
  setStatus("st1","🔍 Claude AI กำลังวิเคราะห์รูปเช็ค...","load");
  callScript({action:"ocr",image:b64Ocr,mime:mime},"ocr");
}
function doSave(){
  var cd={
    check_no:document.getElementById("f1").value.trim(),
    bank:document.getElementById("f2").value.trim(),
    date:document.getElementById("f3").value.trim(),
    amount:document.getElementById("f4").value.trim(),
    payee:document.getElementById("f5").value.trim(),
    filename:document.getElementById("fname").textContent
  };
  if(!cd.check_no||!cd.bank){setStatus("st2","❌ กรุณากรอกเลขที่เช็คและธนาคาร","err");return;}
  var btn=document.getElementById("btn-save");
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> กำลังบันทึก...';
  setStatus("st2","☁️ กำลังบันทึกรูปขึ้น Drive และอัพเดท Sheet...\nอาจใช้เวลา 30-60 วินาที กรุณารอค่ะ","load");
  callScript({action:"save",image:b64Save,mime:mime,data:cd},"save");
}
function callScript(payload,action){
  var xhr=new XMLHttpRequest();
  xhr.open("POST",SCRIPT_URL,true);
  xhr.setRequestHeader("Content-Type","text/plain;charset=utf-8");
  // OCR: 60 วิ, Save: 3 นาที
  xhr.timeout = action==="ocr" ? 60000 : 300000; // OCR: 60วิ, Save: 5นาที
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    if(xhr.status===0){onError(action,"เชื่อมต่อไม่ได้ — ตรวจสอบ URL");return;}
    try{
      var data=JSON.parse(xhr.responseText);
      handleResponse(data,action);
    }catch(e){onError(action,"ข้อมูลผิดพลาด");}
  };
  xhr.ontimeout=function(){
    if(action==="save"){
      // timeout แต่อาจบันทึกสำเร็จแล้ว — ให้เช็ค Drive
      document.getElementById("btn-save").disabled=false;
      document.getElementById("btn-save").innerHTML="☁️ บันทึกขึ้น Google Drive";
      setStatus("st2","⚠️ ระบบช้า — กรุณาเช็คใน Google Drive โฟลเดอร์ ทะเบียนเช็คสั่งจ่าย ว่าไฟล์บันทึกแล้วหรือยัง ถ้ายังไม่มีค่อยกดใหม่","err");
    }else{
      onError(action,"หมดเวลา — กดอ่านข้อมูลใหม่อีกครั้ง");
    }
  };
  xhr.send(JSON.stringify(payload));
}
function handleResponse(data,action){
  if(action==="ocr"){
    var btn=document.getElementById("btn-ocr");
    btn.disabled=false; btn.innerHTML="🔍 อ่านข้อมูลเช็ค";
    if(!data.success){setStatus("st1","❌ "+(data.error||"อ่านไม่ได้"),"err");return;}
    fillForm(data);
  }else if(action==="save"){
    var btn2=document.getElementById("btn-save");
    btn2.disabled=false; btn2.innerHTML="☁️ บันทึกขึ้น Google Drive";
    if(!data.success){setStatus("st2","❌ "+(data.error||"บันทึกไม่สำเร็จ"),"err");return;}
    document.getElementById("s2").style.display="none";
    document.getElementById("s3").style.display="block";
    document.getElementById("step-lbl").textContent="ขั้นตอน 3/3";
    document.getElementById("done-msg").textContent=
      data.filename+"\n"+(data.linked?"✓ บันทึก Drive และอัพเดท Link ใน Sheet แล้ว":"✓ บันทึก Drive แล้ว (ไม่พบเลขที่เช็คใน Sheet)");
    document.getElementById("done-url").href=data.fileUrl||"#";
    // เพิ่มชื่อผู้รับเงินที่เพิ่งบันทึกเข้ารายการในเครื่อง กันเคสยังไม่รีเฟรชหน้า
    var p=(data.payee||document.getElementById("f5").value||"").trim();
    if(p && payeeList.indexOf(p)===-1) payeeList.push(p);
    window.scrollTo(0,0);
  }
}
function onError(action,msg){
  document.getElementById("btn-ocr").disabled=false;
  document.getElementById("btn-ocr").innerHTML="🔍 อ่านข้อมูลเช็ค";
  document.getElementById("btn-save").disabled=false;
  document.getElementById("btn-save").innerHTML="☁️ บันทึกขึ้น Google Drive";
  if(action==="ocr") setStatus("st1","❌ "+msg,"err");
  if(action==="save") setStatus("st2","❌ "+msg,"err");
}
function fillForm(d){
  document.getElementById("f1").value=d.check_no||"";
  document.getElementById("f2").value=d.bank||"";
  document.getElementById("f3").value=d.date||"";
  document.getElementById("f4").value=d.amount||"";
  document.getElementById("f5").value=d.payee||"";
  updateFname();
  renderPayeeSuggestions(d.payee||"");
  var conf=d.confidence||"medium";
  var lbl={high:"✅ มั่นใจสูง",medium:"⚠️ ปานกลาง — โปรดตรวจสอบ",low:"❌ ต่ำ — กรุณาแก้ไขก่อน"};
  document.getElementById("badge-wrap").innerHTML='<div class="badge '+conf+'">'+(lbl[conf]||conf)+'</div>';
  document.getElementById("s1").style.display="none";
  document.getElementById("s2").style.display="block";
  document.getElementById("step-lbl").textContent="ขั้นตอน 2/3";
  setStatus("st2","","");
  window.scrollTo(0,0);
}
function updateFname(){
  var no=document.getElementById("f1").value.trim();
  var bk=document.getElementById("f2").value.trim();
  document.getElementById("fname").textContent=(no&&bk)?no+"_"+bk+".jpg":(no?no+".jpg":"—");
}
["f1","f2"].forEach(function(id){document.getElementById(id).addEventListener("input",updateFname);});
document.getElementById("f5").addEventListener("input",function(){ renderPayeeSuggestions(this.value.trim()); });
function resetAll(){
  b64Ocr=""; b64Save=""; mime="image/jpeg";
  ["s2","s3"].forEach(function(id){document.getElementById(id).style.display="none";});
  document.getElementById("s1").style.display="block";
  document.getElementById("preview-img").style.display="none";
  document.getElementById("preview-ph").style.display="block";
  document.getElementById("btn-ocr").style.display="none";
  document.getElementById("btn-ocr").disabled=false;
  document.getElementById("btn-ocr").innerHTML="🔍 อ่านข้อมูลเช็ค";
  document.getElementById("btn-save").disabled=false;
  document.getElementById("btn-save").innerHTML="☁️ บันทึกขึ้น Google Drive";
  document.getElementById("step-lbl").textContent="ขั้นตอน 1/3";
  document.getElementById("badge-wrap").innerHTML="";
  document.getElementById("fname").textContent="—";
  document.getElementById("size-info").textContent="";
  document.getElementById("payee-suggest").innerHTML="";
  document.getElementById("payee-hint").style.display="none";
  ["f1","f2","f3","f4","f5"].forEach(function(id){
    document.getElementById(id).value="";
    document.getElementById(id).disabled=false;
  });
  document.getElementById("inp-cam").value="";
  document.getElementById("inp-gal").value="";
  setStatus("st1","",""); setStatus("st2","","");
  window.scrollTo(0,0);
}
function setStatus(id,msg,type){
  var el=document.getElementById(id);
  if(!el)return;
  el.innerHTML=msg?'<div class="status s-'+type+'">'+msg+'</div>':"";
}
</script>
</body>
</html>
